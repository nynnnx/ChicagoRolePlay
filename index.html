<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWC // Tactical Weapon Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark-base: #060608;
            --bg-panel: rgba(10, 10, 14, 0.45); 
            --accent-crimson: #ff003c;
            --accent-glow: rgba(255, 0, 60, 0.4);
            --tier-s: #ff003c;
            --tier-a: #ff5500;
            --tier-b: #ffaa00;
            --tier-c: #888888;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: transparent; color: var(--text-main); font-family: var(--font-body); font-size: 17px; height: 100vh; overflow: hidden; display: flex; }

        .video-canvas-local { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; opacity: 0.85; pointer-events: none; object-fit: cover; }
        #star-field { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none; }
        .vignette { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, transparent 20%, var(--bg-dark-base) 95%); z-index: -1; pointer-events: none; }

        .command-dock {
            width: 280px; min-width: 280px; height: 100vh; background: rgba(10, 10, 13, 0.65);
            backdrop-filter: blur(12px); border-right: 2px solid var(--accent-crimson);
            display: flex; flex-direction: column; padding: 25px; z-index: 10;
        }

        .dock-menu-area { flex-grow: 1; }
        .brand-block { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 0, 60, 0.2); margin-bottom: 15px; }
        .brand-logo { width: 70px; margin-bottom: 10px; filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .brand-text { font-family: var(--font-display); font-weight: 900; font-size: 1.1rem; color: #fff; text-transform: uppercase; }
        .brand-text span { color: var(--accent-crimson); }

        .menu-label { font-family: var(--font-display); font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin: 12px 0 5px 5px; }
        .dock-btn { background: rgba(20, 20, 25, 0.4); border: 1px solid rgba(255,255,255,0.03); border-left: 3px solid transparent; color: var(--text-muted); padding: 10px 15px; border-radius: 4px; font-family: var(--font-display); font-size: 0.78rem; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px; transition: all 0.2s; width: 100%; margin-bottom: 6px; }
        .dock-btn:hover, .dock-btn.active { color: #fff; background: linear-gradient(90deg, rgba(255, 0, 60, 0.15), transparent); border-left-color: var(--accent-crimson); }

        /* Bottom Info Box */
        .info-tab {
            background: rgba(12, 12, 16, 0.8);
            border: 1px solid var(--accent-crimson);
            padding: 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-muted);
        }
        .info-tab h4 { color: var(--text-main); font-family: var(--font-display); margin-bottom: 5px; font-size: 0.8rem; }

        .display-terminal { flex: 1; height: 100vh; overflow-y: auto; padding: 40px; position: relative; }
        .panel-box { background: var(--bg-panel); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 40px; display: none; }
        .panel-box.active-panel { display: block; }
        .panel-title { font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 35px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-canvas-local"><source src="Background1.mp4" type="video/mp4"></video>
    <canvas id="star-field"></canvas>
    <div class="vignette"></div>

    <div class="command-dock">
        <div class="dock-menu-area">
            <div class="brand-block">
                <img src="images/Logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none'">
                <div class="brand-text">EWC // <span>System</span></div>
            </div>
            
            <div class="menu-label">Main Matrix</div>
            <button class="dock-btn active" onclick="switchInterface('vault-panel', 'all')"><i class="fa-solid fa-layer-group"></i> All Weapons</button>
            <button class="dock-btn" onclick="switchInterface('vault-panel', 'tier2')"><i class="fa-solid fa-diamond"></i> S Tier Weapons</button>
            <button class="dock-btn" onclick="switchInterface('vault-panel', 'tier15')"><i class="fa-solid fa-award"></i> A Tier Weapons</button>
            <button class="dock-btn" onclick="switchInterface('vault-panel', 'tier1')"><i class="fa-solid fa-star"></i> B Tier Weapons</button>
            <button class="dock-btn" onclick="switchInterface('vault-panel', 'test')"><i class="fa-solid fa-shield-blank"></i> C Tier Weapons</button>
            
            <div class="menu-label">Modules</div>
            <button class="dock-btn" onclick="switchInterface('spin-panel')"><i class="fa-solid fa-clover"></i> Faction Drop</button>
        </div>

        <div class="info-tab" id="static-info-tab">
            <h4 id="info-title"></h4>
            <p id="info-content"></p>
        </div>
    </div>

    <div class="display-terminal">
        <div id="vault-panel" class="panel-box active-panel">
            <h2 class="panel-title"><i class="fa-solid fa-shield-halved"></i> Inventory Storage Registry</h2>
            <div id="vault-dynamic-dump"></div>
        </div>
        <div id="spin-panel" class="panel-box">
            <h2 class="panel-title"><i class="fa-solid fa-trident"></i> Tactical Drop Engine</h2>
            </div>
    </div>

    <script>
        // EDIT INFO HERE IN THE SCRIPT:
        const INFO_CONTENT = {
            title: "SYSTEM STATUS: ACTIVE",
            body: "Welcome to the EWC Tactical Hub. Utilize the navigation matrix to manage assets or deploy simulation drops. System version 1.0.4."
        };

        // Populate info tab
        document.getElementById('info-title').innerText = INFO_CONTENT.title;
        document.getElementById('info-content').innerText = INFO_CONTENT.body;

        function switchInterface(targetPanelId, activeFilter) {
            document.querySelectorAll('.panel-box').forEach(p => p.style.display = 'none');
            document.getElementById(targetPanelId).style.display = 'block';
            // (Include your existing buildStorageVault/logic functions here)
        }
    </script>
</body>
</html>
