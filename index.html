<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ChicagoRolePlay</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        /* ================= THEME STYLING CONFIG ================= */

        :root {

            --bg-dark-base: #060608;

            --bg-panel: rgba(10, 10, 14, 0.45); 

            --accent-crimson: #ff003c;

            --accent-glow: rgba(255, 0, 60, 0.4);

            

            --tier-s: #ff003c;

            --tier-a: #ff5500;

            --tier-b: #ffaa00;

            --tier-c: #888888;



            --text-main: #ffffff;

            --text-muted: #8a8a93;

            --font-display: 'Orbitron', sans-serif;

            --font-body: 'Rajdhani', sans-serif;

        }



        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {

            background: transparent;

            color: var(--text-main);

            font-family: var(--font-body);

            font-size: 17px;

            letter-spacing: 0.05em;

            height: 100vh;

            width: 100vw;

            overflow: hidden;

            display: flex;

            position: relative;

        }



        /* Ambient Video Backdrop */

        .video-canvas-local {

            position: fixed;

            top: 0; 

            left: 0; 

            width: 100vw; 

            height: 100vh;

            z-index: -3;

            opacity: 0.85; 

            pointer-events: none;

            object-fit: cover;

        }



        /* Falling Star Dynamic Canvas Environment */

        #star-field {

            position: fixed;

            top: 0;

            left: 0;

            width: 100vw;

            height: 100vh;

            z-index: -2;

            pointer-events: none;

        }

        

        .vignette {

            position: fixed;

            top: 0; left: 0; width: 100vw; height: 100vh;

            background: radial-gradient(circle at center, transparent 20%, var(--bg-dark-base) 95%);

            z-index: -1;

            pointer-events: none;

        }



        /* ================= SIDEBAR COMMAND DOCK ================= */

        .command-dock {

            width: 280px;

            min-width: 280px;

            height: 100vh;

            background: rgba(10, 10, 13, 0.65);

            backdrop-filter: blur(12px);

            -webkit-backdrop-filter: blur(12px);

            border-right: 2px solid var(--accent-crimson);

            display: flex;

            flex-direction: column;

            justify-content: space-between; /* Pushes content down to the bottom */

            padding: 25px;

            z-index: 10;

            box-shadow: 5px 0 35px rgba(0,0,0,0.6);

        }



        /* Wrap top content together so everything doesn't split awkwardly */

        .dock-top-content {

            display: flex;

            flex-direction: column;

            overflow: hidden;

            flex-grow: 1;

        }



        .brand-block {

            text-align: center;

            padding-bottom: 20px;

            border-bottom: 1px solid rgba(255, 0, 60, 0.2);

            margin-bottom: 15px;

            flex-shrink: 0;

        }

        .brand-logo {

            width: 70px;

            height: auto;

            margin-bottom: 10px;

            filter: drop-shadow(0 0 8px var(--accent-glow));

        }

        .brand-text {

            font-family: var(--font-display);

            font-weight: 900;

            font-size: 1.1rem;

            letter-spacing: 0.1em;

            color: #fff;

            text-transform: uppercase;

        }

        .brand-text span { color: var(--accent-crimson); }



        .dock-menu {

            display: flex;

            flex-direction: column;

            gap: 6px;

            flex-grow: 1;

            overflow-y: auto;

            padding-right: 5px;

        }

        .dock-menu::-webkit-scrollbar { width: 3px; }

        .dock-menu::-webkit-scrollbar-thumb { background: rgba(255, 0, 60, 0.3); }



        .menu-label {

            font-family: var(--font-display);

            font-size: 0.7rem;

            font-weight: 700;

            color: var(--text-muted);

            text-transform: uppercase;

            letter-spacing: 0.15em;

            margin: 12px 0 5px 5px;

        }

        .dock-btn {

            background: rgba(20, 20, 25, 0.4);

            border: 1px solid rgba(255,255,255,0.03);

            border-left: 3px solid transparent;

            color: var(--text-muted);

            padding: 10px 15px;

            border-radius: 4px;

            font-family: var(--font-display);

            font-size: 0.78rem;

            font-weight: 700;

            text-transform: uppercase;

            cursor: pointer;

            text-align: left;

            display: flex;

            align-items: center;

            gap: 12px;

            transition: all 0.2s ease;

        }

        .dock-btn i { width: 18px; text-align: center; }

        .dock-btn:hover, .dock-btn.active {

            color: #fff;

            background: linear-gradient(90deg, rgba(255, 0, 60, 0.15), transparent);

            border-left-color: var(--accent-crimson);

            box-shadow: inset 5px 0 10px rgba(255, 0, 60, 0.05);

        }

        .dock-btn.active {

            background: linear-gradient(90deg, rgba(255, 0, 60, 0.3), transparent);

            text-shadow: 0 0 8px rgba(255,255,255,0.5);

        }



        /* ================= SIDEBAR LOCKED LOWER INFO TERMINAL ================= */

        .sidebar-static-info {

            margin-top: 20px;

            border-top: 1px solid rgba(255, 0, 60, 0.2);

            padding-top: 15px;

            background: rgba(12, 12, 16, 0.5);

            border-radius: 4px;

            padding: 12px;

            box-shadow: inset 0 0 10px rgba(0,0,0,0.4);

            flex-shrink: 0;

        }

        .info-header-tag {

            font-family: var(--font-display);

            font-size: 0.7rem;

            font-weight: 900;

            color: var(--accent-crimson);

            text-transform: uppercase;

            letter-spacing: 0.1em;

            margin-bottom: 6px;

            display: flex;

            align-items: center;

            gap: 6px;

        }

        .info-body-text {

            font-family: var(--font-body);

            font-size: 0.92rem;

            color: #ffffff;

            line-height: 1.4;

            font-weight: 600;

        }

        .info-system-footer {

            margin-top: 8px;

            font-family: var(--font-display);

            font-size: 0.62rem;

            color: var(--text-muted);

            text-transform: uppercase;

            border-top: 1px solid rgba(255,255,255,0.05);

            padding-top: 6px;

            display: flex;

            justify-content: space-between;

        }



        /* ================= CENTRAL DISPLAY TERMINAL ================= */

        .display-terminal {

            flex: 1;

            height: 100vh;

            overflow-y: auto;

            padding: 40px;

            position: relative;

            z-index: 5;

        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }

        ::-webkit-scrollbar-track { background: transparent; }

        ::-webkit-scrollbar-thumb { background: var(--accent-crimson); border-radius: 3px; }



        .panel-box {

            background: var(--bg-panel);

            border: 1px solid rgba(255, 255, 255, 0.08); 

            border-radius: 12px;

            padding: 40px;

            backdrop-filter: blur(8px); 

            -webkit-backdrop-filter: blur(8px);

            box-shadow: 0 20px 60px rgba(0,0,0,0.7);

            display: none;

        }

        .panel-box.active-panel { display: block; animation: panelFade 0.4s ease-out forwards; }

        

        @keyframes panelFade {

            from { opacity: 0; transform: translateY(15px); }

            to { opacity: 1; transform: translateY(0); }

        }



        .panel-title {

            font-family: var(--font-display);

            font-weight: 900;

            font-size: 1.8rem;

            text-transform: uppercase;

            margin-bottom: 35px;

            display: flex;

            align-items: center;

            gap: 15px;

            border-bottom: 1px solid rgba(255,255,255,0.05);

            padding-bottom: 15px;

        }

        .panel-title i { color: var(--accent-crimson); }



        /* ================= STORAGE VAULT VIEW ================= */

        .vault-sections-container {

            display: flex;

            flex-direction: column;

            gap: 45px;

        }

        .vault-section.hidden-pool {

            display: none;

        }

        .vault-category-title {

            font-family: var(--font-display);

            font-weight: 700;

            font-size: 1.1rem;

            letter-spacing: 0.1em;

            margin-bottom: 20px;

            display: flex;

            align-items: center;

            gap: 10px;

            text-transform: uppercase;

        }

        .vault-category-title span {

            padding: 2px 8px;

            border-radius: 3px;

            font-size: 0.8rem;

            color: #000;

            font-weight: 900;

        }



        .weapon-grid {

            display: grid;

            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

            gap: 20px;

        }

        .weapon-card {

            background: rgba(12, 12, 16, 0.7); 

            border: 1px solid rgba(255,255,255,0.05);

            border-top: 3px solid #333;

            border-radius: 6px;

            padding: 20px;

            display: flex;

            flex-direction: column;

            align-items: center;

            position: relative;

            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);

        }

        .weapon-card img {

            width: 100%;

            height: 110px;

            object-fit: contain;

            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.8));

            transition: transform 0.3s ease;

        }

        .weapon-card:hover {

            transform: translateY(-4px);

            background: rgba(20, 20, 25, 0.85);

        }

        .weapon-card:hover img { transform: scale(1.05); }

        .weapon-decay {

            margin-top: 15px;

            font-family: var(--font-display);

            font-weight: 700;

            font-size: 0.85rem;

            color: #fff;

            text-transform: uppercase;

            text-align: center;

        }



        /* Tier Border & Hover Glow Configurations */

        .card-s { border-top-color: var(--tier-s); }

        .card-s:hover {

            border-color: rgba(255, 0, 60, 0.6);

            box-shadow: 0 0 25px rgba(255, 0, 60, 0.45);

        }



        .card-a { border-top-color: var(--tier-a); }

        .card-a:hover {

            border-color: rgba(255, 85, 0, 0.6);

            box-shadow: 0 0 25px rgba(255, 85, 0, 0.45);

        }



        .card-b { border-top-color: var(--tier-b); }

        .card-b:hover {

            border-color: rgba(255, 170, 0, 0.6);

            box-shadow: 0 0 25px rgba(255, 170, 0, 0.45);

        }



        .card-c { border-top-color: var(--tier-c); }

        .card-c:hover {

            border-color: rgba(136, 136, 136, 0.6);

            box-shadow: 0 0 25px rgba(136, 136, 136, 0.45);

        }



        .bg-s { background: var(--tier-s); }

        .bg-a { background: var(--tier-a); }

        .bg-b { background: var(--tier-b); }

        .bg-c { background: var(--tier-c); }



        /* ================= OPERATIONAL SPIN WINDOW ================= */

        .spin-interface {

            max-width: 900px;

            margin: 0 auto;

            text-align: center;

        }

        .config-panel {

            display: flex;

            justify-content: center;

            gap: 15px;

            align-items: center;

            margin-bottom: 35px;

        }

        .selector-box {

            background: #111116;

            border: 1px solid rgba(255,0,60,0.3);

            color: #fff;

            padding: 12px 25px;

            font-family: var(--font-display);

            font-size: 0.9rem;

            font-weight: 700;

            border-radius: 4px;

            outline: none;

            cursor: pointer;

        }

        .action-btn {

            background: linear-gradient(90deg, #b3002a, var(--accent-crimson));

            border: none;

            color: #fff;

            padding: 12px 40px;

            border-radius: 4px;

            cursor: pointer;

            font-family: var(--font-display);

            font-weight: 900;

            text-transform: uppercase;

            font-size: 0.9rem;

            letter-spacing: 0.05em;

            box-shadow: 0 4px 15px var(--accent-glow);

            transition: all 0.2s;

        }

        .action-btn:hover:not(:disabled) {

            box-shadow: 0 0 25px var(--accent-crimson);

            filter: brightness(1.1);

        }

        .action-btn:disabled { background: #222; color: #555; box-shadow: none; cursor: not-allowed; }



        .wheel-viewport {

            height: 160px;

            overflow: hidden;

            border: 2px solid var(--accent-crimson);

            position: relative;

            background: #030305;

            border-radius: 8px;

            margin-bottom: 30px;

            box-shadow: inset 0 0 35px rgba(0,0,0,0.9);

        }

        .wheel-crosshair {

            position: absolute;

            left: 50%; top: 0; bottom: 0;

            width: 4px;

            background: var(--accent-crimson);

            z-index: 10;

            transform: translateX(-50%);

            box-shadow: 0 0 15px var(--accent-crimson), 0 0 4px #fff;

        }

        .wheel-reel {

            display: flex;

            align-items: center;

            position: absolute;

            left: 0;

            height: 100%;

        }

        .wheel-item {

            min-width: 180px;

            width: 180px;

            text-align: center;

            opacity: 0.4;

            transition: opacity 0.3s;

        }

        .wheel-item img { height: 75px; width: 130px; object-fit: contain; }

        .wheel-item span {

            display: block; font-size: 0.75rem; color: var(--text-muted);

            font-family: var(--font-display); text-transform: uppercase; margin-top: 5px;

            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px;

        }



        #spin-log {

            font-family: var(--font-display);

            font-weight: 700;

            color: var(--accent-crimson);

            text-transform: uppercase;

            min-height: 1.5em;

            font-size: 1.05rem;

            margin-bottom: 10px;

        }

        #loot-manifest {

            display: flex;

            flex-wrap: wrap;

            justify-content: center;

            gap: 15px;

            margin-top: 30px;

        }

    </style>

</head>

    <script>

    const DB = {

        test: [{name:"Glock17 P80", img:"images/Glock17P80C.png"}, {name:"Kavorka G43x", img:"images/KavorkaG43xC.png"}, {name:"Glock45", img:"images/Glock45C.png"}, {name:"MP9 2.0", img:"images/MP9C.png"}, {name:"PSA Custom", img:"images/PSACustomC.png"}, {name:"Custom P320 Sig", img:"images/CustomP320C.png"}, {name:"FN 502 Tactical", img:"images/FN509C.png"}],

        tier0: [{name:"Glock19x Coyote", img:"images/Glock19xB.png"}, {name:"Glock45 Camo", img:"images/Glock45CamoB.png"}, {name:"Custom Glock17 Binary", img:"images/CustomGlock17B.png"}, {name:"Glock19 Gen5 Switch", img:"images/Glock19Gen5B.png"}, {name:"4 Inch Arp", img:"images/4InchB.png"},],

        tier1: [{name:"Glock21C G-Flex", img:"images/Glock21C G-FlexA.png"}, {name:"Custom Dagger Switch", img:"images/Custom Dagger SwitchA.png"}, {name:"Glock45 Gen5 RedSwitch", img:"images/Glock45 Gen5 RedSwitchA.png"}, {name:"Glock19 Gen5 RedSwitch", img:"images/Glock19Gen5B.png"}, {name:"MP9 FRT", img:"images/MP9 FRTA.png"}, {name:"MPA Defender", img:"images/MPA DefenderA.png"}, {name:"Mini Arp", img:"images/Mini 762 ArpA.png"}, {name:"4 Inch Custom Arp", img:"images/4InchCustomARPA.png"}, {name:"Glock19 P80 Switch", img:"images/Glock19 P80 SwitchA.png"}],

        tier15: [{name:"3 inch Arp Tan", img:"images/3incharp.png"}, {name:"Psa Dagger", img:"images/PSADAGGER.png"}, {name:"Glock 19 FDE Gen 4", img:"images/G19FDEGEN4.png"}, {name:"Ruger Sr40", img:"images/Ruger.png"}, {name:"Glock 19XB", img:"images/Glock19XB.png"}],

        tier2: [{name:"Glock 43X Switch", img:"images/Glock43XSwitch.png"}, {name:"Glock 40 Camo", img:"images/Glock40Camo.png"}, {name:"Sig P365x", img:"images/Sig.png"}, {name:"Glock 40", img:"images/Glock40Custom.png"}, {name:"Glock 17 Switch", img:"images/Glock17Switch.png"}, {name:"Black Micro Draco", img:"images/BlackDraco.png"}]

    };



    const CROSS_TIER_LOGIC = {

        tier0: ["", ""],

        tier1: ["", ""],

        tier15: ["", "", "", ""],

        tier2: ["", ""]

    };



    const config = { test: 2, tier1: 2, tier15: 2, tier2: 2 };

    const ITEM_WIDTH = 180;

    let lastWonWeaponName = "";



    const tierMeta = {

        test: { label: "C Tier", style: "c" },

        tier1: { label: "B Tier", style: "b" },

        tier15: { label: "A Tier", style: "a" },

        tier2: { label: "S Tier", style: "s" }

    };



    window.addEventListener('DOMContentLoaded', () => {

        buildStorageVault();

        initStarFieldEngine();

    });



    // ================= FALLING STAR PARTICLE HARDWARE SYSTEM =================

    function initStarFieldEngine() {

        const canvas = document.getElementById('star-field');

        const ctx = canvas.getContext('2d');

        

        let width = canvas.width = window.innerWidth;

        let height = canvas.height = window.innerHeight;

        

        window.addEventListener('resize', () => {

            width = canvas.width = window.innerWidth;

            height = canvas.height = window.innerHeight;

        });



        const starImg = new Image();

        starImg.src = 'images/2.png'; 



        const tacticalRed = '#ff003c';

        const starCount = 35; 

        const stars = [];



        for(let i = 0; i < starCount; i++) {

            stars.push({

                x: Math.random() * width,

                y: Math.random() * height - height,

                size: 18, 

                speed: Math.random() * 1.2 + 0.6,

                opacity: Math.random() * 0.5 + 0.2

            });

        }



        function renderEngine() {

            ctx.clearRect(0, 0, width, height);

            

            for(let i = 0; i < starCount; i++) {

                let s = stars[i];

                s.y += s.speed;

                

                if(s.y > height) {

                    s.y = -30;

                    s.x = Math.random() * width;

                    s.speed = Math.random() * 1.2 + 0.6;

                }



                ctx.save();

                ctx.globalAlpha = s.opacity;

                ctx.shadowBlur = 12;

                ctx.shadowColor = tacticalRed;

                

                if (starImg.complete && starImg.naturalWidth !== 0) {

                    ctx.drawImage(starImg, s.x - s.size/2, s.y - s.size/2, s.size, s.size);

                } else {

                    ctx.fillStyle = tacticalRed;

                    ctx.beginPath();

                    ctx.arc(s.x, s.y, s.size / 3, 0, Math.PI * 2);

                    ctx.fill();

                }

                

                ctx.restore();

            }

            requestAnimationFrame(renderEngine);

        }



        starImg.onload = () => { renderEngine(); };

        starImg.onerror = () => { renderEngine(); };

        renderEngine();

    }



    // ================= DOCK PANEL CONTROLLER + FILTERS =================

    function switchInterface(targetPanelId, activeFilter = null) {

        document.querySelectorAll('.panel-box').forEach(p => p.classList.remove('active-panel'));

        document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));

        

        document.getElementById(targetPanelId).classList.add('active-panel');

        

        if (targetPanelId === 'spin-panel') {

            document.getElementById('btn-spin').classList.add('active');

        } else if (activeFilter) {

            document.getElementById(`btn-${activeFilter}`).classList.add('active');

        }



        if (targetPanelId === 'vault-panel') {

            const sections = document.querySelectorAll('.vault-section');

            sections.forEach(sec => {

                if (!activeFilter || activeFilter === 'all') {

                    sec.classList.remove('hidden-pool');

                } else {

                    if (sec.getAttribute('data-tier-pool') === activeFilter) {

                        sec.classList.remove('hidden-pool');

                    } else {

                        sec.classList.add('hidden-pool');

                    }

                }

            });

        }

    }



    // ================= VAULT RENDER MATRIX =================

    function buildStorageVault() {

        const vaultContainer = document.getElementById('vault-dynamic-dump');

        vaultContainer.innerHTML = "";



        Object.keys(tierMeta).forEach(key => {

            const section = document.createElement('div');

            section.className = "vault-section";

            section.setAttribute('data-tier-pool', key);

            const meta = tierMeta[key];

            

            let htmlStr = `

                <div class="vault-category-title">

                    <span class="bg-${meta.style}">${meta.label}</span> Asset Storage Pool

                </div>

                <div class="weapon-grid">

            `;



            DB[key].forEach(item => {

                htmlStr += `

                    <div class="weapon-card card-${meta.style}">

                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150/111115/ff003c?text=Weapon'">

                        <div class="weapon-decay">${item.name}</div>

                    </div>

                `;

            });



            htmlStr += `</div>`;

            section.innerHTML = htmlStr;

            vaultContainer.appendChild(section);

        });

    }



    // ================= DROP WHEEL ROULETTE LOGIC MODULE =================

    function buildReel(targetPool, winner) {

        const reel = document.getElementById('reel');

        reel.innerHTML = "";

        const strikeIndex = 65; 

        

        for(let i = 0; i < 85; i++) {

            const weapon = (i === strikeIndex) ? winner : targetPool[Math.floor(Math.random() * targetPool.length)];

            const div = document.createElement('div');

            div.className = "wheel-item";

            div.innerHTML = `<img src="${weapon.img}" onerror="this.src='https://via.placeholder.com/150/111115/ff003c?text=Asset'"><span>${weapon.name}</span>`;

            reel.appendChild(div);

        }

    }



    async function processFullDrop() {

        const tier = document.getElementById('spinTierSelect').value;

        const count = config[tier];

        const btn = document.getElementById('masterSpinBtn');

        const tray = document.getElementById('loot-manifest');

        const status = document.getElementById('spin-log');

        

        btn.disabled = true; 

        tray.innerHTML = "";

        lastWonWeaponName = "";



        for(let i = 0; i < count; i++) {

            status.innerHTML = `<i class="fa-solid fa-crosshairs fa-spin"></i> INTERCEPTING PACKAGE ${i+1}/${count}...`;

            await performSingleSpin(tier);

            await new Promise(r => setTimeout(r, 800));

        }

        status.innerHTML = `<i class="fa-solid fa-box-open"></i> LOGISTICS CONGLOMERATE DELIVERED!`;

        btn.disabled = false;

    }



    function performSingleSpin(tier) {

        return new Promise((resolve) => {

            const reel = document.getElementById('reel');

            const viewport = document.querySelector('.wheel-viewport');

            const tray = document.getElementById('loot-manifest');

            

            let spinPool = [...DB[tier]];

            if (tier === 'tier1') spinPool.push(...DB.tier0.filter(w => CROSS_TIER_LOGIC.tier1.includes(w.name)));

            else if (tier === 'tier15') spinPool.push(...DB.tier1.filter(w => CROSS_TIER_LOGIC.tier15.includes(w.name)));

            else if (tier === 'tier2') spinPool.push(...DB.tier15.filter(w => CROSS_TIER_LOGIC.tier2.includes(w.name)));



            let winner = spinPool[Math.floor(Math.random() * spinPool.length)];

            let attempts = 0;



            while(winner.name === lastWonWeaponName && attempts < 3) {

                winner = spinPool[Math.floor(Math.random() * spinPool.length)];

                attempts++;

            }

            

            lastWonWeaponName = winner.name;

            const strikeIndex = 65; 



            buildReel(spinPool, winner);

            

            reel.style.transition = "none";

            reel.style.transform = "translateX(0px)";

            reel.offsetHeight; 

            

            const centerOffset = (viewport.offsetWidth / 2) - (ITEM_WIDTH / 2);

            const targetX = (strikeIndex * ITEM_WIDTH) - centerOffset;

            

            reel.style.transition = "transform 3.2s cubic-bezier(0.1, 0.8, 0.1, 1)";

            reel.style.transform = `translateX(-${targetX}px)`;

            

            setTimeout(() => {

                const children = reel.children;

                for(let c=0; c<children.length; c++) {

                    if(c === strikeIndex) children[c].style.opacity = "1";

                    else children[c].style.opacity = "0.1";

                }



                const p = document.createElement('div');

                p.style.cssText = `

                    background: rgba(13, 13, 18, 0.8); border: 1px solid var(--accent-crimson);

                    padding: 12px; border-radius: 4px; width: 140px; text-align: center;

                    box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: panelFade 0.4s ease forwards;

                `;

                p.innerHTML = `<img src="${winner.img}" style="width:100%; height:60px; object-fit:contain; margin-bottom:5px;" onerror="this.src='https://via.placeholder.com/150/111115/ff003c?text=Weapon'"><span style="display:block; font-size:0.75rem; font-family:var(--font-display); font-weight:700; text-transform:uppercase;">${winner.name}</span>`;

                tray.appendChild(p);

                resolve();

            }, 3400);

        });

    }

    </script>
