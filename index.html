<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChicagoRolePlayNewGen</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark-base: #060608;
            --bg-panel: rgba(10, 10, 14, 0.45); 
            --accent-crimson: #ff003c;
            --accent-glow: rgba(255, 0, 60, 0.4);
            --tier-s: #ff003c;
            --tier-a: #ff5500;
            --tier-b: #ffaa00;
            --tier-c: #888888;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: transparent; color: var(--text-main); font-family: var(--font-body); height: 100vh; overflow: hidden; display: flex; }

        .command-dock {
            width: 280px; height: 100vh; background: rgba(10, 10, 13, 0.65);
            backdrop-filter: blur(12px); border-right: 2px solid var(--accent-crimson);
            display: flex; flex-direction: column; padding: 25px; z-index: 10;
        }

        /* Fixed Brand Block */
        .brand-block { 
            text-align: center; 
            padding: 30px 0 20px 0; /* Added top padding to ensure glow isn't cut by screen edge */
            border-bottom: 1px solid rgba(255, 0, 60, 0.2); 
            margin-bottom: 20px; 
        }
        
        .glowing-logo-wrapper {
            width: 120px; /* Slightly increased for better glow visibility */
            height: 120px;
            margin: 0 auto;
            border-radius: 50%;
            border: 2px solid var(--accent-crimson);
            /* Glow settings */
            box-shadow: 0 0 25px var(--accent-crimson), inset 0 0 15px var(--accent-crimson);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            /* CRITICAL FIX: Ensure the glow isn't clipped by the parent */
            overflow: visible; 
            position: relative;
        }
        .brand-logo { width: 90%; height: 90%; border-radius: 50%; object-fit: cover; }

        .dock-menu { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; overflow-y: auto; }
        .dock-btn {
            background: rgba(20, 20, 25, 0.4); border: 1px solid rgba(255,255,255,0.03);
            color: var(--text-muted); padding: 10px 15px; border-radius: 4px;
            font-family: var(--font-display); font-size: 0.78rem; cursor: pointer;
            text-align: left; display: flex; align-items: center; gap: 12px;
        }
        .dock-btn:hover, .dock-btn.active { color: #fff; background: rgba(255, 0, 60, 0.15); border-left: 3px solid var(--accent-crimson); }

        .display-terminal { flex: 1; padding: 40px; }
        .panel-box { background: var(--bg-panel); padding: 40px; display: none; }
        .panel-box.active-panel { display: block; }
        
        /* ... keeping your existing logic ... */
    </style>
</head>
<body>
    <div class="command-dock">
        <div class="brand-block">
            <div class="glowing-logo-wrapper">
                <img src="images/2.jpg" alt="Logo" class="brand-logo">
            </div>
        </div>
        
        <div class="dock-menu">
            <button class="dock-btn" onclick="switchInterface('vault-panel')"><i class="fa-solid fa-diamond"></i> S Tier Weapons</button>
            <button class="dock-btn" onclick="switchInterface('spin-panel')"><i class="fa-solid fa-clover"></i> Faction Drop</button>
        </div>
    </div>

    <div class="display-terminal">
        </div>

    <script>
        function switchInterface(panel) { /* existing logic */ }
    </script>
</body>
</html>
