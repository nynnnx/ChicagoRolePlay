<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChicagoRolePlayNewGen</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark-base: #060608;
            --bg-panel: rgba(10, 10, 14, 0.45); 
            --accent-crimson: #ff003c;
            --accent-glow: rgba(255, 0, 60, 0.4);
            --tier-s: #ff003c;
            --tier-a: #ff5500;
            --tier-b: #ffaa00;
            --tier-c: #888888;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #060608; color: var(--text-main); font-family: var(--font-body); height: 100vh; overflow: hidden; display: flex; }

        /* Media / Backgrounds */
        .video-canvas-local { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; object-fit: cover; opacity: 0.8; }
        #star-field { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; }
        .vignette { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, transparent 20%, #060608 95%); z-index: -1; }

        /* Sidebar */
        .command-dock { width: 280px; height: 100vh; background: rgba(10, 10, 13, 0.8); backdrop-filter: blur(12px); border-right: 2px solid var(--accent-crimson); display: flex; flex-direction: column; padding: 25px; z-index: 10; }
        .brand-block { text-align: center; margin-bottom: 30px; }
        .brand-logo { width: 70px; margin-bottom: 10px; }
        .brand-text { font-family: var(--font-display); font-weight: 900; color: #fff; }
        .brand-text span { color: var(--accent-crimson); }
        
        .dock-menu { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .menu-label { font-family: var(--font-display); font-size: 0.7rem; color: var(--text-muted); margin: 15px 0 5px 5px; }
        .dock-btn { background: rgba(20, 20, 25, 0.4); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 10px; cursor: pointer; text-align: left; transition: 0.3s; }
        .dock-btn:hover, .dock-btn.active { color: #fff; background: var(--accent-crimson); border-color: var(--accent-crimson); }

        /* Sidebar Footer */
        .sidebar-static-info { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--accent-crimson); font-size: 0.8rem; }
        .info-header-tag { color: var(--accent-crimson); font-family: var(--font-display); font-weight: 900; margin-bottom: 5px; }

        /* Main Display */
        .display-terminal { flex: 1; height: 100vh; overflow-y: auto; padding: 40px; }
        .panel-box { background: var(--bg-panel); border-radius: 12px; padding: 40px; display: none; }
        .panel-box.active-panel { display: block; }
        .panel-title { font-family: var(--font-display); margin-bottom: 30px; color: var(--accent-crimson); }

        /* Wheel */
        .wheel-viewport { height: 180px; overflow: hidden; border: 2px solid var(--accent-crimson); position: relative; background: #000; margin: 20px 0; display: flex; align-items: center; }
        .wheel-crosshair { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--accent-crimson); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent-crimson); }
        .wheel-reel { display: flex; position: absolute; left: 0; transition: transform 3s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .wheel-item { min-width: 180px; text-align: center; }
        .wheel-item img { height: 100px; width: 150px; object-fit: contain; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-canvas-local">
        <source src="images/Background1.mp4" type="video/mp4">
    </video>
    <canvas id="star-field"></canvas>
    <div class="vignette"></div>

    <div class="command-dock">
        <div class="brand-block">
            <img src="images/Logo.png" alt="Logo" class="brand-logo">
            <div class="brand-text">Chicago<span>NewGen</span></div>
        </div>
        <div class="dock-menu">
            <div class="menu-label">Main Storage</div>
            <button class="dock-btn active" onclick="switchInterface('vault-panel')">Inventory</button>
            <div class="menu-label">Wheel Spin</div>
            <button class="dock-btn" onclick="switchInterface('spin-panel')">Faction Drop</button>
        </div>
        <div class="sidebar-static-info">
            <div class="info-header-tag"><i class="fa-solid fa-terminal"></i> Info</div>
            <div class="info-body-text">Welcome to ChicagoRolePlay Storage.</div>
            <div class="info-system-footer">Website Made By Nyn. v1.0</div>
        </div>
    </div>

    <div class="display-terminal">
        <div id="vault-panel" class="panel-box active-panel">
            <h2 class="panel-title">Inventory Storage</h2>
            <div id="vault-dynamic-dump"></div>
        </div>

        <div id="spin-panel" class="panel-box">
            <h2 class="panel-title">Faction Drop Spin</h2>
            <button class="dock-btn" onclick="performSpin()">Start Spin</button>
            <div class="wheel-viewport">
                <div class="wheel-crosshair"></div>
                <div id="reel" class="wheel-reel"></div>
            </div>
            <div id="spin-log">Standing By...</div>
        </div>
    </div>

    <script>
        const DB = [{name:"Glock17", img:"images/Glock17P80C.png"}, {name:"MP9", img:"images/MP9C.png"}, {name:"Draco", img:"images/BlackDracoBS.png"}];

        function switchInterface(id) {
            document.querySelectorAll('.panel-box').forEach(p => p.classList.remove('active-panel'));
            document.getElementById(id).classList.add('active-panel');
        }

        function performSpin() {
            const reel = document.getElementById('reel');
            reel.innerHTML = "";
            // Build visual reel
            for(let i = 0; i < 50; i++) {
                const item = DB[Math.floor(Math.random() * DB.length)];
                const div = document.createElement('div');
                div.className = "wheel-item";
                div.innerHTML = `<img src="${item.img}"><span>${item.name}</span>`;
                reel.appendChild(div);
            }
            // Animate
            const totalWidth = 50 * 180;
            reel.style.transition = "none";
            reel.style.transform = "translateX(0px)";
            setTimeout(() => {
                reel.style.transition = "transform 3s cubic-bezier(0.1, 0.8, 0.1, 1)";
                reel.style.transform = `translateX(-${(40 * 180) - 90}px)`;
            }, 50);
        }
    </script>
</body>
</html>
