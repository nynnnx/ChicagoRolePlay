<!DOCTYPE html>
<html>
<head>
<style>
    /* Styling for the weapon container and the central line */
    #drop-container {
        position: relative;
        width: 600px;
        overflow: hidden;
        border: 1px solid #333;
    }
    #weapon-track {
        display: flex;
        transition: transform 3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        white-space: nowrap;
    }
    .weapon-item { padding: 0 50px; }
    .selection-line {
        position: absolute;
        top: 0; left: 50%;
        border-left: 2px solid red;
        height: 100%;
    }
    .fade-out {
        opacity: 0;
        transition: opacity 0.5s ease-out;
    }
</style>
</head>
<body>

<div id="drop-container">
    <div id="weapon-track">
        <div class="weapon-item">G365X</div>
        <div class="weapon-item">SENTINEL</div>
        <div class="weapon-item">GLOCK 22</div>
        <div class="weapon-item">G365X</div>
    </div>
    <div class="selection-line"></div>
</div>

<div id="status-text"></div>
<div id="result-display" style="display: none;">
    <div id="reward-1">SENTINEL</div>
    <div id="reward-2">GLOCK 22</div>
</div>

<button onclick="startDrop()">START DROP</button>

<script>
function startDrop() {
    const track = document.getElementById('weapon-track');
    const status = document.getElementById('status-text');
    
    // 1. Trigger "Intercepting" state
    status.innerText = "INTERCEPTING PACKAGE 1/2...";
    track.style.transform = "translateX(-200px)"; 
    
    // 2. Handle fade-out after spin animation
    setTimeout(() => {
        track.classList.add('fade-out');
        
        // 3. Show delivery result
        setTimeout(() => {
            status.innerText = "LOGISTICS CONGLOMERATE DELIVERED!";
            document.getElementById('result-display').style.display = 'block';
        }, 500); 
    }, 3000); 
}
</script>
</body>
</html>
