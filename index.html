<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWC // Tactical Weapon Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= THEME STYLING CONFIG ================= */
        :root {
            --bg-dark-base: #060608;
            --bg-panel: rgba(12, 12, 16, 0.85);
            --accent-crimson: #ff003c;
            --accent-glow: rgba(255, 0, 60, 0.4);
            
            --tier-s: #ff003c;
            --tier-a: #ff5500;
            --tier-b: #ffaa00;
            --tier-c: #888888;
            --tier-att: #00aaff;

            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark-base);
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 17px;
            letter-spacing: 0.05em;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Ambient Cyber Backdrop */
        .video-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            opacity: 0.15;
            pointer-events: none;
            overflow: hidden;
        }
        .video-canvas iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.1);
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, #000000 95%);
            z-index: -1;
            pointer-events: none;
        }

        /* ================= SIDEBAR COMMAND DOCK ================= */
        .command-dock {
            width: 280px;
            background: #0a0a0d;
            border-right: 2px solid var(--accent-crimson);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            z-index: 10;
            box-shadow: 5px 0 35px rgba(0,0,0,0.8);
        }

        .brand-block {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 0, 60, 0.2);
        }
        .brand-logo {
            width: 70px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }
        .brand-text {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            color: #fff;
            text-transform: uppercase;
        }
        .brand-text span { color: var(--accent-crimson); }

        .dock-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 30px;
            flex-grow: 1;
        }
        .menu-label {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin: 15px 0 5px 5px;
        }
        .dock-btn {
            background: rgba(20, 20, 25, 0.5);
            border: 1px solid rgba(255,255,255,0.03);
            border-left: 3px solid transparent;
            color: var(--text-muted);
            padding: 12px 15px;
            border-radius: 4px;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
        }
        .dock-btn i { width: 18px; text-align: center; }
        .dock-btn:hover, .dock-btn.active {
            color: #fff;
            background: linear-gradient(90deg, rgba(255, 0, 60, 0.15), transparent);
            border-left-color: var(--accent-crimson);
            border-top-solid: 1px rgba(255, 0, 60, 0.2);
            box-shadow: inset 5px 0 10px rgba(255, 0, 60, 0.05);
        }
        .dock-btn.active {
            background: linear-gradient(90deg, rgba(255, 0, 60, 0.3), transparent);
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* ================= CENTRAL DISPLAY TERMINAL ================= */
        .display-terminal {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            z-index: 5;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent-crimson); border-radius: 3px; }

        .panel-box {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            display: none;
        }
        .panel-box.active-panel { display: block; animation: panelFade 0.4s ease-out forwards; }
        
        @keyframes panelFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-title {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.8rem;
            text-transform: uppercase;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }
        .panel-title i { color: var(--accent-crimson); }

        /* ================= STORAGE VAULT VIEW ================= */
        .vault-sections-container {
            display: flex;
            flex-direction: column;
            gap: 45px;
        }
        .vault-category-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }
        .vault-category-title span {
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
            color: #000;
            font-weight: 900;
        }

        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .weapon-card {
            background: #0c0c10;
            border: 1px solid rgba(255,255,255,0.02);
            border-top: 3px solid #333;
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .weapon-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .weapon-card img {
            width: 100%;
            height: 110px;
            object-fit: contain;
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.8));
            transition: transform 0.3s ease;
        }
        .weapon-card:hover img { transform: scale(1.05); }
        .weapon-name {
            margin-top: 15px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
        }

        /* Tier Specific Colors */
        .card-s { border-top-color: var(--tier-s); }
        .card-a { border-top-color: var(--tier-a); }
        .card-b { border-top-color: var(--tier-b); }
        .card-c { border-top-color: var(--tier-c); }
        .card-att { border-top-color: var(--tier-att); }

        .bg-s { background: var(--tier-s); }
        .bg-a { background: var(--tier-a); }
        .bg-b { background: var(--tier-b); }
        .bg-c { background: var(--tier-c); }
        .bg-att { background: var(--tier-att); }

        /* ================= OPERATIONAL SPIN WINDOW ================= */
        .spin-interface {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        .config-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            margin-bottom: 35px;
        }
        .selector-box {
            background: #111116;
            border: 1px solid rgba(255,0,60,0.3);
            color: #fff;
            padding: 12px 25px;
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        .action-btn {
            background: linear-gradient(90deg, #b3002a, var(--accent-crimson));
            border: none;
            color: #fff;
            padding: 12px 40px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-display);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: all 0.2s;
        }
        .action-btn:hover:not(:disabled) {
            box-shadow: 0 0 25px var(--accent-crimson);
            filter: brightness(1.1);
        }
        .action-btn:disabled { background: #222; color: #555; box-shadow: none; cursor: not-allowed; }

        .wheel-viewport {
            height: 160px;
            overflow: hidden;
            border: 2px solid var(--accent-crimson);
            position: relative;
            background: #030305;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 35px rgba(0,0,0,0.9);
        }
        .wheel-crosshair {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 4px;
            background: var(--accent-crimson);
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px var(--accent-crimson), 0 0 4px #fff;
        }
        .wheel-reel {
            display: flex;
            align-items: center;
            position: absolute;
            left: 0;
            height: 100%;
        }
        .wheel-item {
            min-width: 180px;
            width: 180px;
            text-align: center;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .wheel-item img { height: 75px; width: 130px; object-fit: contain; }
        .wheel-item span {
            display: block; font-size: 0.75rem; color: var(--text-muted);
            font-family: var(--font-display); text-transform: uppercase; margin-top: 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px;
        }

        #spin-log {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--accent-crimson);
            text-transform: uppercase;
            min-height: 1.5em;
            font-size: 1.05rem;
            margin-bottom: 10px;
        }
        #loot-manifest {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        /* ================= STATION AUDIO DECK ================= */
        .audio-deck {
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        .deck-art { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .deck-details { flex-grow: 1; overflow: hidden; text-align: left; }
        .deck-track {
            font-size: 0.8rem; font-weight: 700; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .deck-controls { display: flex; gap: 12px; margin-top: 4px; }
        .deck-icon { cursor: pointer; color: var(--text-muted); font-size: 0.8rem; transition: color 0.2s; }
        .deck-icon:hover { color: #fff; }
        .deck-icon.active { color: var(--accent-crimson); }
    </style>
</head>
<body>

    <!-- Environment Configurations -->
    <div class="video-canvas"><div id="player"></div></div>
    <div class="vignette"></div>

    <!-- Left Command Navigation Bar -->
    <div class="command-dock">
        <div class="top-dock-group">
            <div class="brand-block">
                <img src="images/Logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none'">
                <div class="brand-text">EWC // <span>System</span></div>
            </div>
            
            <div class="dock-menu">
                <div class="menu-label">Main Matrix</div>
                <button class="dock-btn active" onclick="switchInterface('vault-panel')">
                    <i class="fa-solid fa-warehouse"></i> Armory Vault
                </button>
                <button class="dock-btn" onclick="switchInterface('spin-panel')">
                    <i class="fa-solid fa-clover"></i> Faction Drop
                </button>
            </div>
        </div>

        <!-- Integrated Audio Sub-Module -->
        <div class="audio-deck">
            <img src="" id="m-art" class="deck-art" alt="Feed">
            <div class="deck-details">
                <div class="deck-track" id="m-title">Loading Stream...</div>
                <div class="deck-controls">
                    <i class="fas fa-backward deck-icon" onclick="changeSong(-1)"></i>
                    <i class="fas fa-play deck-icon" id="play-btn" onclick="togglePlay()"></i>
                    <i class="fas fa-forward deck-icon" onclick="changeSong(1)"></i>
                    <i class="fas fa-volume-xmark deck-icon" id="mute-btn" onclick="toggleMute()" style="margin-left:auto;"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Central Monitor Terminal Output -->
    <div class="display-terminal">
        
        <!-- Interface Panel 1: Main Storage Vault -->
        <div id="vault-panel" class="panel-box active-panel">
            <h2 class="panel-title"><i class="fa-solid fa-shield-halved"></i> Inventory Storage Registry</h2>
            <div class="vault-sections-container" id="vault-dynamic-dump">
                <!-- Loaded Dynamically via Script Engine -->
            </div>
        </div>

        <!-- Interface Panel 2: Drop Module Roulette -->
        <div id="spin-panel" class="panel-box">
            <h2 class="panel-title"><i class="fa-solid fa-trident"></i> Tactical Drop Engine</h2>
            <div class="spin-interface">
                <div class="config-panel">
                    <select id="spinTierSelect" class="selector-box">
                        <option value="test">C Tier (Test Drop)</option>
                        <option value="tier1">B Tier (Tier 1)</option>
                        <option value="tier15">A Tier (Tier 1.5)</option>
                        <option value="tier2">S Tier (Tier 2)</option>
                        <option value="attachments">Attachments Registry</option>
                    </select>
                    <button class="action-btn" id="masterSpinBtn" onclick="processFullDrop()">Initialize Sequence</button>
                </div>

                <div class="wheel-viewport">
                    <div class="wheel-crosshair"></div>
                    <div id="reel" class="wheel-reel"></div>
                </div>

                <div id="spin-log">System Standing By...</div>
                <div id="loot-manifest"></div>
            </div>
        </div>

    </div>

    <!-- System Architect Scripts -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
    // ================= INTEGRATED DATABASE ARCHETYPE =================
    const DB = {
        test: [{name:"Sentinel", img:"images/Sentinel.png"}, {name:"Glock19X Tan", img:"images/Glock19XTan.png"}, {name:"Glock 22", img:"images/Glock 22.png"}, {name:"G365X", img:"images/G365X.png"}],
        tier0: [{name:"1911", img:"images/1911.png"}, {name:"Glock 17", img:"images/Glockk17.png"}, {name:"Glock 40", img:"images/Glock40.png"}, {name:"PX4", img:"images/PX4.png"}, {name:"Glock 19Gen 5", img:"images/Glock19Gen5.png"}, {name:"Glock 21Gen 5", img:"images/Glock21Gen5.png"}],
        tier1: [{name:"Glock 17 Gen 5", img:"images/Glockk17Gen5.png"}, {name:"Glock 45", img:"images/Glock45.png"}, {name:"Glock 19x8", img:"images/Glock 19x8.png"}, {name:"Glock 19 GEN5", img:"images/Glockk19Gen5.png"}, {name:"Glock 17", img:"images/Glock17.png"}, {name:"Glock 17 Gen 3", img:"images/Glock17GEN5.png"}],
        tier15: [{name:"3 inch Arp Tan", img:"images/3incharp.png"}, {name:"Psa Dagger", img:"images/PSADAGGER.png"}, {name:"Glock 19 FDE Gen 4", img:"images/G19FDEGEN4.png"}, {name:"Ruger Sr40", img:"images/Ruger.png"}, {name:"Glock 19XB", img:"images/Glock19XB.png"}],
        tier2: [{name:"Glock 43X Switch", img:"images/Glock43XSwitch.png"}, {name:"Glock 40 Camo", img:"images/Glock40Camo.png"}, {name:"Sig P365x", img:"images/Sig.png"}, {name:"Glock 40", img:"images/Glock40Custom.png"}, {name:"Glock 17 Switch", img:"images/Glock17Switch.png"}, {name:"Black Micro Draco", img:"images/BlackDraco.png"}],
        attachments: [{name:"Clear Kriss Vector", img:"images/ClearKriss.png"}, {name:"Black Kriss Vector", img:"images/BlackKriss.png"}, {name:"White Kriss Vector", img:"images/WhiteKriss.png"}, {name:"Tan Kriss Vector", img:"images/TanKriss.png"}, {name:"Black Extended Mag", img:"images/Blackextendedclip.png"}, {name:"Tan Extended Mag", img:"images/Tanextendedclip.png"}, {name:"Clear Extended Mag", img:"images/tacticalextendedmagclear.png"}, {name:"Tan Extended Mag", img:"images/tacticalextendedmagtan.png"}, {name:"Black Window Mag", img:"images/utgwindowedmag.png"}, {name:"Red Extended Mag", img:"images/tacticalextendedmag3.png"}, {name:"Tan Extended Mag", img:"images/tacticalextendedmag4.png"}, {name:"Black Extended Mag", img:"images/tacticalextendedmag.png"}, {name:"50 Round Drum", img:"images/tacticaldrummag.png"}, {name:"Black Kriss Vector", img:"images/tacticalextendedmag2.png"}, {name:"White Kriss Vector", img:"images/klanevectormagw.png"}, {name:"Tan Kriss Vector", img:"images/klanevectormagt.png"}, {name:"Black Kriss Vector", img:"images/klanevectormag.png"}, {name:"BlackPistolGrip", img:"images/blackpistolgrip.png"}, {name:"BluePistolGrip", img:"images/bluepistolgrip.png"}, {name:"PinkCamoPistolGrip", img:"images/camogripp.png"}, {name:"CamoPistolGrip", img:"images/camogrip.png"}, {name:"CamoPistolGrip", img:"images/camogript.png"}, {name:"DarkGreenPistolGri", img:"images/darkgreenpistolgrip.png"}, {name:"GrayPistolGrip", img:"images/graypistolgrip.png"}, {name:"GreenPistolGrip", img:"images/greenpistolgrip.png"}, {name:"PinkPistolGrip", img:"images/pinkpistolgrip.png"}, {name:"PurplePistolGrip", img:"images/purplepistolgrip.png"}, {name:"RedPistolGrip", img:"images/redpistolgrip.png"}, {name:"TanPistolGrip", img:"images/tanpistolgrip.png"}, {name:"BlackhoguePistolGrip", img:"images/hoguepistolgrip.png"}, {name:"GreenhoguePistolGrip", img:"images/hoguepistolgripg.png"}, {name:"TanhoguePistolgrip", img:"images/hoguepistolgript.png"}, {name:"BlackTape", img:"images/goontapeb.png"}, {name:"GreenTape", img:"images/goontapet.png"}, {name:"RubberBand", img:"images/rubberbands.png"}, {name:"BrownTape", img:"images/goontape.png"}, {name:"PistolForeGrip", img:"images/PistolForeGrip.png"}, {name:"PurpleBeam", img:"images/PurpleBeam.png"}, {name:"RedBeam", img:"images/RedBeam.png"}, {name:"GreenBeam", img:"images/GreenBeam.png"}, {name:"BlueBeam", img:"images/BlueBeam.png"}, {name:"FlashLight", img:"images/FlashLight.png"}],
    };

    const CROSS_TIER_LOGIC = {
        tier0: ["Sentinel", "G365X"],
        tier1: ["Glock 21Gen 5", "PX4"],
        tier15: ["Glock 19x8", "RMGlock 17Gen 3", "Glock 45", "RMGlock 17"],
        tier2: ["Ruger Sr40", "Glock 19XB"]
    };

    const config = { test: 2, tier1: 5, tier15: 5, tier2: 7, attachments: 1 };
    const ITEM_WIDTH = 180;
    let lastWonWeaponName = "";

    // Mapping keys explicitly to clean text display and colors
    const tierMeta = {
        test: { label: "C Tier", style: "c" },
        tier1: { label: "B Tier", style: "b" },
        tier15: { label: "A Tier", style: "a" },
        tier2: { label: "S Tier", style: "s" },
        attachments: { label: "Attachments", style: "att" }
    };

    // Initialize System Core
    window.addEventListener('DOMContentLoaded', () => {
        buildStorageVault();
    });

    // ================= DOCK PANEL CONTROLLER =================
    function switchInterface(targetPanelId) {
        document.querySelectorAll('.panel-box').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(targetPanelId).classList.add('active-panel');
        
        // Active visual styling state change trigger
        const clickedBtn = Array.from(document.querySelectorAll('.dock-btn')).find(b => b.getAttribute('onclick').includes(targetPanelId));
        if(clickedBtn) clickedBtn.classList.add('active');
    }

    // ================= RECONSTRUCTED VAULT GENERATOR =================
    function buildStorageVault() {
        const vaultContainer = document.getElementById('vault-dynamic-dump');
        vaultContainer.innerHTML = "";

        Object.keys(tierMeta).forEach(key => {
            const section = document.createElement('div');
            section.className = "vault-section";
            
            const meta = tierMeta[key];
            
            let htmlStr = `
                <div class="vault-category-title">
                    <span class="bg-${meta.style}">${meta.label}</span> Asset Storage Pool
                </div>
                <div class="weapon-grid">
            `;

            DB[key].forEach(item => {
                htmlStr += `
                    <div class="weapon-card card-${meta.style}">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150/111115/ff003c?text=Weapon'">
                        <div class="weapon-name">${item.name}</div>
                    </div>
                `;
            });

            htmlStr += `</div>`;
            section.innerHTML = htmlStr;
            vaultContainer.appendChild(section);
        });
    }

    // ================= ROTATION WHEEL LOGIC MODULE =================
    function buildReel(targetPool, winner) {
        const reel = document.getElementById('reel');
        reel.innerHTML = "";
        const strikeIndex = 65; 
        
        for(let i = 0; i < 85; i++) {
            const weapon = (i === strikeIndex) ? winner : targetPool[Math.floor(Math.random() * targetPool.length)];
            const div = document.createElement('div');
            div.className = "wheel-item";
            div.innerHTML = `<img src="${weapon.img}" onerror="this.src='https://via.placeholder.com/150/111115/ff003c?text=Asset'"><span>${weapon.name}</span>`;
            reel.appendChild(div);
        }
    }

    async function processFullDrop() {
        const tier = document.getElementById('spinTierSelect').value;
        const count = config[tier];
        const btn = document.getElementById('masterSpinBtn');
        const tray = document.getElementById('loot-manifest');
        const status = document.getElementById('spin-log');
        
        btn.disabled = true; 
        tray.innerHTML = "";
        lastWonWeaponName = "";

        for(let i = 0; i < count; i++) {
            status.innerHTML = `<i class="fa-solid fa-crosshairs fa-spin"></i> INTERCEPTING PACKAGE ${i+1}/${count}...`;
            await performSingleSpin(tier);
            await new Promise(r => setTimeout(r, 800));
        }
        status.innerHTML = `<i class="fa-solid fa-box-open"></i> LOGISTICS CONGLOMERATE DELIVERED!`;
        btn.disabled = false;
    }

    function performSingleSpin(tier) {
        return new Promise((resolve) => {
            const reel = document.getElementById('reel');
            const viewport = document.querySelector('.wheel-viewport');
            const tray = document.getElementById('loot-manifest');
            const meta = tierMeta[tier];
            
            let spinPool = [...DB[tier]];
            // Inheritance balancing matrices
            if (tier === 'tier1') spinPool.push(...DB.tier0.filter(w => CROSS_TIER_LOGIC.tier1.includes(w.name)));
            else if (tier === 'tier15') spinPool.push(...DB.tier1.filter(w => CROSS_TIER_LOGIC.tier15.includes(w.name)));
            else if (tier === 'tier2') spinPool.push(...DB.tier15.filter(w => CROSS_TIER_LOGIC.tier2.includes(w.name)));

            let winner = spinPool[Math.floor(Math.random() * spinPool.length)];
            let attempts = 0;

            while(winner.name === lastWonWeaponName && attempts < 3) {
                winner = spinPool[Math.floor(Math.random() * spinPool.length)];
                attempts++;
            }
            
            lastWonWeaponName = winner.name;
            const strikeIndex = 65; 

            buildReel(spinPool, winner);
            
            reel.style.transition = "none";
            reel.style.transform = "translateX(0px)";
            reel.offsetHeight; 
            
            const centerOffset = (viewport.offsetWidth / 2) - (ITEM_WIDTH / 2);
            const targetX = (strikeIndex * ITEM_WIDTH) - centerOffset;
            
            reel.style.transition = "transform 3.2s cubic-bezier(0.1, 0.8, 0.1, 1)";
            reel.style.transform = `translateX(-${targetX}px)`;
            
            setTimeout(() => {
                const children = reel.children;
                for(let c=0; c<children.length; c++) {
                    if(c === strikeIndex) children[c].style.opacity = "1";
                    else children[c].style.opacity = "0.1";
                }

                const p = document.createElement('div');
                p.className = `reward-pill`;
                p.style.cssText = `
                    background: #0d0d12; border: 1px solid var(--accent-crimson);
                    padding: 12px; border-radius: 4px; width: 140px; text-align: center;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: slideUp 0.4s ease forwards;
                `;
                p.innerHTML = `<img src="${winner.img}" style="width:100%; height:60px; object-fit:contain; margin-bottom:5px;" onerror="this.src='https://via.placeholder.com/150/111115/ff003c?text=Weapon'"><span style="display:block; font-size:0.75rem; font-family:var(--font-display); font-weight:700; text-transform:uppercase;">${winner.name}</span>`;
                tray.appendChild(p);
                resolve();
            }, 3400);
        });
    }

    function onYouTubeIframeAPIReady() {
        updateUI();
        ytPlayer = new YT.Player('player', {
            videoId: playlist[currentIdx].id,
            playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 0, 'rel': 0 },
            events: { 
                'onReady': (e) => e.target.playVideo(),
                'onStateChange': (e) => { 
                    if (e.data === YT.PlayerState.ENDED) changeSong(1); 
                    updatePlayButtonState(e.data);
                }
            }
        });
    }

    function updateUI() {
        document.getElementById('m-title').innerText = playlist[currentIdx].title;
        document.getElementById('m-art').src = playlist[currentIdx].art;
    }

    function updatePlayButtonState(state) {
        const playBtn = document.getElementById('play-btn');
        if (state === YT.PlayerState.PLAYING) playBtn.className = "fas fa-pause deck-icon active";
        else playBtn.className = "fas fa-play deck-icon";
    }

    function changeSong(dir) {
        currentIdx = (currentIdx + dir + playlist.length) % playlist.length;
        ytPlayer.loadVideoById(playlist[currentIdx].id);
        updateUI();
    }

    function togglePlay() {
        if (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
        else ytPlayer.playVideo();
    }

    function toggleMute() {
        const muteBtn = document.getElementById('mute-btn');
        if (ytPlayer.isMuted()) {
            ytPlayer.unMute();
            muteBtn.className = "fas fa-volume-high deck-icon";
        } else {
            ytPlayer.mute();
            muteBtn.className = "fas fa-volume-xmark deck-icon active";
        }
    }
