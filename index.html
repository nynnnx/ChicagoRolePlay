<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChicagoRolePlayNewGen</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark-base: #060608;
            --bg-panel: rgba(10, 10, 14, 0.45); 
            --accent-crimson: #ff003c;
            --tier-s: #ff003c;
            --tier-a: #ff5500;
            --tier-b: #ffaa00;
            --tier-c: #888888;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: transparent; color: var(--text-main); font-family: var(--font-body); height: 100vh; width: 100vw; overflow: hidden; display: flex; }

        .video-canvas-local { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; opacity: 0.85; pointer-events: none; object-fit: cover; }
        #star-field { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none; }
        .vignette { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, transparent 20%, var(--bg-dark-base) 95%); z-index: -1; pointer-events: none; }

        .command-dock { width: 280px; min-width: 280px; height: 100vh; background: rgba(10, 10, 13, 0.65); backdrop-filter: blur(12px); border-right: 2px solid var(--accent-crimson); display: flex; flex-direction: column; padding: 25px; z-index: 10; }
        .dock-menu { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        .dock-btn { background: rgba(20, 20, 25, 0.4); border: 1px solid rgba(255,255,255,0.03); border-left: 3px solid transparent; color: var(--text-muted); padding: 10px 15px; border-radius: 4px; font-family: var(--font-display); font-size: 0.78rem; font-weight: 700; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
        .dock-btn.active { background: linear-gradient(90deg, rgba(255, 0, 60, 0.3), transparent); color: #fff; border-left-color: var(--accent-crimson); }
        
        .display-terminal { flex: 1; height: 100vh; overflow-y: auto; padding: 40px; }
        .panel-box { background: var(--bg-panel); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 40px; display: none; }
        .panel-box.active-panel { display: block; }
        .panel-title { font-family: var(--font-display); font-weight: 900; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 35px; }

        /* Weapon Grid & Hover Glows */
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .weapon-card { background: rgba(12, 12, 16, 0.7); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 20px; text-align: center; transition: all 0.3s ease; }
        .weapon-card img { width: 100%; height: 110px; object-fit: contain; }
        
        /* Updated Hover Glows */
        .card-s:hover { border-color: var(--tier-s); box-shadow: 0 0 20px 2px var(--tier-s); }
        .card-a:hover { border-color: var(--tier-a); box-shadow: 0 0 20px 2px var(--tier-a); }
        .card-b:hover { border-color: var(--tier-b); box-shadow: 0 0 20px 2px var(--tier-b); }
        .card-c:hover { border-color: var(--tier-c); box-shadow: 0 0 20px 2px var(--tier-c); }

        .vault-section.hidden-pool { display: none; }
        .vault-category-title { font-family: var(--font-display); font-weight: 700; margin-bottom: 20px; text-transform: uppercase; }
        .bg-s { color: var(--tier-s); } .bg-a { color: var(--tier-a); } .bg-b { color: var(--tier-b); } .bg-c { color: var(--tier-c); }

        .spin-interface { max-width: 900px; margin: 0 auto; text-align: center; }
        .selector-box { background: #111116; border: 1px solid rgba(255,0,60,0.3); color: #fff; padding: 12px 25px; border-radius: 4px; cursor: pointer; }
        .action-btn { background: var(--accent-crimson); border: none; color: #fff; padding: 12px 40px; border-radius: 4px; cursor: pointer; font-family: var(--font-display); font-weight: 900; }
        .wheel-viewport { height: 160px; overflow: hidden; border: 2px solid var(--accent-crimson); background: #030305; margin-bottom: 30px; }
        .wheel-reel { display: flex; align-items: center; position: absolute; left: 0; height: 100%; }
        .wheel-item { min-width: 180px; opacity: 0.4; }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline class="video-canvas-local"><source src="images/Background1.mp4" type="video/mp4"></video>
    <canvas id="star-field"></canvas>
    <div class="vignette"></div>

    <div class="command-dock">
        <div class="brand-block"><div class="brand-text">Chicago<span>NewGen</span></div></div>
        <div class="dock-menu">
            <button class="dock-btn" id="btn-tier2" onclick="switchInterface('vault-panel', 'tier2')"><i class="fa-solid fa-diamond"></i> S Tier</button>
            <button class="dock-btn" id="btn-tier15" onclick="switchInterface('vault-panel', 'tier15')"><i class="fa-solid fa-award"></i> A Tier</button>
            <button class="dock-btn" id="btn-tier1" onclick="switchInterface('vault-panel', 'tier1')"><i class="fa-solid fa-star"></i> B Tier</button>
            <button class="dock-btn" id="btn-test" onclick="switchInterface('vault-panel', 'test')"><i class="fa-solid fa-shield-blank"></i> C Tier</button>
            <button class="dock-btn active" id="btn-spin" onclick="switchInterface('spin-panel')"><i class="fa-solid fa-clover"></i> Faction Drop</button>
        </div>
    </div>

    <div class="display-terminal">
        <div id="vault-panel" class="panel-box">
            <h2 class="panel-title">Inventory Storage</h2>
            <div id="vault-dynamic-dump"></div>
        </div>

        <div id="spin-panel" class="panel-box active-panel">
            <h2 class="panel-title">Faction Drop Spin</h2>
            <div class="spin-interface">
                <select id="spinTierSelect" class="selector-box">
                    <option value="test">C Tier</option><option value="tier1">B Tier</option>
                    <option value="tier15">A Tier</option><option value="tier2">S Tier</option>
                </select>
                <button class="action-btn" id="masterSpinBtn" onclick="processFullDrop()">Start Drop</button>
                <div class="wheel-viewport"><div id="reel" class="wheel-reel"></div></div>
            </div>
        </div>
    </div>

    <script>
    const DB = {
        test: [{name:"Glock17 P80", img:"images/Glock17P80C.png"}, {name:"Kavorka G43x", img:"images/KavorkaG43xC.png"}],
        tier1: [{name:"Glock19x Coyote", img:"images/Glock19xB.png"}],
        tier15: [{name:"Glock21C G-Flex", img:"images/Glock21C G-FlexA.png"}],
        tier2: [{name:"Glock20C G-Flex", img:"images/Glock20c G-FlexS.png"}]
    };

    function switchInterface(target, filter) {
        document.querySelectorAll('.panel-box').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(target).classList.add('active-panel');
        event.currentTarget.classList.add('active');
        if(filter) {
            document.querySelectorAll('.vault-section').forEach(s => s.classList.toggle('hidden-pool', s.dataset.tierPool !== filter));
        }
    }

    function buildStorageVault() {
        const dump = document.getElementById('vault-dynamic-dump');
        Object.keys(DB).forEach(key => {
            const style = key === 'test' ? 'c' : (key === 'tier1' ? 'b' : (key === 'tier15' ? 'a' : 's'));
            let html = `<div class="vault-section hidden-pool" data-tier-pool="${key}"><div class="vault-category-title bg-${style}">${key.toUpperCase()} Pool</div><div class="weapon-grid">`;
            DB[key].forEach(i => html += `<div class="weapon-card card-${style}"><img src="${i.img}"><p>${i.name}</p></div>`);
            dump.innerHTML += html + `</div></div>`;
        });
    }
    buildStorageVault();
    </script>
</body>
</html>
